name: Keepalive

# Pings the cloud API health endpoint every 3 days to prevent
# Supabase free-tier projects from auto-pausing after inactivity.

on:
  schedule:
    - cron: "0 9 */3 * *" # 09:00 UTC every 3 days
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ secrets.ZEPHR_CLOUD_URL }}/health" || echo "000")
          echo "Health endpoint returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: health check returned $STATUS (non-fatal)"
          fi
